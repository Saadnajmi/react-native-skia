name: CI
on:
  push:
    branches:
      - main
      - next
  pull_request:
    branches:
      - main
      - next
  merge_group:
    types:
      - checks_requested
  workflow_dispatch: {}

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      - run: pip install cpplint
      - run: cpplint --linelength=230 --filter=-legal/copyright,-whitespace/indent,-whitespace/comments,-whitespace/ending_newline,-build/include_order,-runtime/references,-readability/todo,-whitespace/blank_line,-whitespace/todo,-runtime/int,-build/c++11,-whitespace/parens --exclude=package/cpp/skia --exclude=package/apple --exclude=package/android/build --exclude=package/node_modules --recursive package
      - name: cpplint windows native module
        run: cpplint --linelength=230 --filter=-legal/copyright,-whitespace/indent,-whitespace/comments,-whitespace/ending_newline,-build/include_order,-runtime/references,-readability/todo,-whitespace/blank_line,-whitespace/todo,-runtime/int,-build/c++11,-whitespace/parens,-build/c++17,-build/include_subdir,-build/include_what_you_use --recursive packages/skia/windows/ReactNativeSkia
        continue-on-error: true

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      # - name: Clang Format Check
      #   working-directory: packages/skia
      #   run: |
      #     yarn clang-format
      #     if [[ `git status --porcelain` ]]; then
      #       echo "ERROR: clang-format would modify files. Please run 'yarn clang-format' and commit the changes."
      #       echo "Files that would be modified:"
      #       git status --porcelain
      #       echo "Diff of changes:"
      #       git diff
      #       exit 1
      #     fi

      - name: Lint files
        run: yarn lint

      - name: Typecheck files
        run: yarn tsc

  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        run: yarn test

  build-library:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        run: yarn build

      - name: Pack package
        working-directory: packages/skia
        run: yarn pack

      - name: Upload package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: package-tgz
          path: packages/skia/package.tgz

      - name: Build dry run release
        working-directory: packages/skia
        run: |
          npx semantic-release --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  test-package-e2e:
    needs: build-library
    uses: ./.github/workflows/test-skia-package.yml
    with:
      skia_version: artifact:${{ needs.build-library.outputs.run_id }}
      test_ios: true
      test_android: true
      test_web: true

  build-windows-library:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        run: yarn build

      # MSBuild will reject a malformed .vcxproj on its own; the prior
      # xmlstarlet-based pre-flight check kept flaking on `choco install` and
      # added no signal beyond what MSBuild reports.
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2.0.0

      - name: Setup NuGet
        uses: NuGet/setup-nuget@a21f25cd3998bf370fde17e3f1b4c12c175172f9 # v2.0.0

      - name: Restore NuGet packages
        working-directory: packages/skia/windows
        run: nuget restore ReactNativeSkia.sln

      # Compile the native Windows module without linking. The link step
      # cannot succeed until a Skia prebuilt for windows/{x64,arm64} is
      # published — that's tracked separately via `build-skia.yml`'s
      # `build-windows` job. The compile step alone catches:
      #   - Windows SDK / cppwinrt header mismatches
      #   - Microsoft.ReactNative API drift
      #   - Skia header path / inclusion errors
      #   - C++20 + Skia source-level breakages
      # Failures here are real signal even though linker errors are not.
      - name: Compile ReactNativeSkia (no link, x64 Debug)
        working-directory: packages/skia/windows
        continue-on-error: true
        run: msbuild ReactNativeSkia.sln /p:Configuration=Debug /p:Platform=x64 /t:ClCompile /v:normal /bl:msbuild-x64-debug.binlog

      - name: Upload MSBuild binlog
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: msbuild-windows-binlog
          path: packages/skia/windows/msbuild-x64-debug.binlog
          if-no-files-found: warn

  build-test-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    # The Windows test-app build is exploratory in Phase 1 (RNW autolink
    # + NuGet version alignment + Fabric component registration drift).
    # Don't fail the whole CI run on it yet; the binlog/screenshot
    # artifacts are the deliverable.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2.0.0

      - name: Setup NuGet
        uses: NuGet/setup-nuget@a21f25cd3998bf370fde17e3f1b4c12c175172f9 # v2.0.0

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@7e868db0f3406270dd46e1dac26c65f621456723 # master

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Update depot_tools
        working-directory: ./externals/depot_tools
        run: ./update_depot_tools.bat
        shell: cmd

      # Build Skia for windows-x64 inline. Phase 2 will switch this to
      # download the prebuilt artifact from build-skia.yml's release
      # publish; that's not blocking on the test-app validation we want
      # here.
      - name: Build Skia for Windows x64
        working-directory: ./packages/skia
        env:
          GIT_SYNC_DEPS_SKIP_EMSDK: 'true'
        run: yarn build-skia windows-x64
        shell: bash

      # The example app pins react-native@0.83.1, but
      # react-native-windows tracks RN versions and the latest published
      # is 0.81.x. Without a matching RNW init-test-app silently skips
      # Windows scaffolding ('react-native-windows@0.83 cannot be added
      # because it does not exist'). Override the example's RN+RNW to
      # 0.81 for this CI job only (the lockfile change isn't pushed
      # back). YARN_ENABLE_IMMUTABLE_INSTALLS=false relaxes the
      # `--immutable` policy the Setup composite enforced for the rest
      # of the workspace.
      # The example app pins:
      #   - react-native@0.83.1 (no matching RNW exists yet)
      #   - react-native-windows@^0.75.0 (too old for our peer dep)
      #   - react-native-test-app@4.4.7 (only supports RNW 0.70-0.79)
      # Bump all three to a CI-only set that lines up: RNW 0.81.x +
      # RN 0.81.x + test-app 5.1.x (which accepts RNW 0.76-0.82).
      # YARN_ENABLE_IMMUTABLE_INSTALLS=false relaxes the immutable
      # policy the Setup composite enforced.
      - name: Override RN + RNW + test-app versions for init (CI-only)
        working-directory: apps/example
        shell: bash
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
        run: |
          yarn add react-native@^0.81.0 react-native-windows@^0.81.0
          yarn add --dev react-native-test-app@^5.1.0

      # init-test-app sets up the test-app project (downloads the
      # template-0.81.x.tgz, configures react-native.config.js, etc.)
      # but does NOT actually generate the windows/ host files. Per
      # the test-app docs the Windows scaffolding is a separate
      # `npx install-windows-test-app` step that materializes
      # apps/example/windows/example.sln + project files.
      - name: Initialize test-app project
        working-directory: apps/example
        shell: bash
        run: |
          npx --yes init-test-app \
            --platform windows \
            --destination . \
            --name example \
            --version 0.81

      - name: Install Windows test-app host (sln + vcxproj scaffolding)
        working-directory: apps/example
        shell: bash
        run: |
          npx --yes install-windows-test-app

      # The runner only has SDK 10.0.26100 but the test-app template
      # targets 10.0.22621. Two-pronged fix:
      #   (1) drop a Directory.Build.props at apps/example/windows so
      #       every C++ project under it (including generated ones in
      #       node_modules/.generated/windows referenced by the .sln)
      #       picks up WindowsTargetPlatformVersion=10.0.26100.0;
      #   (2) sweep every text project file under apps/example for
      #       literal "10.0.22621.0" and rewrite to 10.0.26100.0 in
      #       case it's pinned somewhere Directory.Build.props can't
      #       override (e.g. a .csproj imported from a NuGet package).
      # Drop a Directory.Build.props at apps/example/ so EVERY C++
      # project loaded under that tree (apps/example/windows/example.sln
      # and the generated apps/example/node_modules/.generated/windows
      # projects it references) inherits WindowsTargetPlatformVersion=
      # 10.0.26100.0. Earlier attempts placed this only at
      # apps/example/windows/ which doesn't reach .generated.
      # The test-app template-0.81.x's AppxManifest.xml declares a
      # PackageDependency on Microsoft.WindowsAppRuntime.1.7, but the
      # GitHub windows-latest runner only ships 1.8 (see deploy log
      # 'Microsoft.WindowsAppRuntime.1.7/X64 is not currently installed').
      # Without the framework the app fails to initialize before a
      # window is shown — no dump, no stderr, no visible UI.
      # Rewrite every reference to Microsoft.WindowsAppRuntime.1.7 →
      # Microsoft.WindowsAppRuntime.1.8 in generated test-app files.
      - name: Retarget WindowsAppRuntime 1.7 → 1.8 in test-app manifest
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "apps/example" -Recurse -Force `
            -Include "AppxManifest.xml","*.wapproj","*.vcxproj","*.props","*.targets","*.csproj","packages.config" `
            -ErrorAction SilentlyContinue
          $patched = 0
          foreach ($f in $files) {
            try {
              $content = Get-Content $f.FullName -Raw -ErrorAction Stop
              if ($content -match "WindowsAppRuntime\.1\.7|WindowsAppRuntime/1\.7|Microsoft\.WindowsAppRuntime.*1\.7") {
                $new = $content -replace "WindowsAppRuntime\.1\.7","WindowsAppRuntime.1.8"
                Set-Content -Path $f.FullName -Value $new -NoNewline
                $patched++
                Write-Host "Retargeted: $($f.FullName)"
              }
            } catch { }
          }
          Write-Host "WindowsAppRuntime files retargeted: $patched"

      - name: Pin WindowsTargetPlatformVersion via Directory.Build.props
        shell: pwsh
        run: |
          $sdkVer = "10.0.26100.0"
          $dirProps = "apps/example/Directory.Build.props"
          $lines = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<Project>',
            '  <PropertyGroup>',
            "    <WindowsTargetPlatformVersion>$sdkVer</WindowsTargetPlatformVersion>",
            '    <WindowsTargetPlatformMinVersion>10.0.19041.0</WindowsTargetPlatformMinVersion>',
            "    <TargetPlatformVersion>$sdkVer</TargetPlatformVersion>",
            '  </PropertyGroup>',
            '</Project>'
          )
          Set-Content -Path $dirProps -Value ($lines -join [Environment]::NewLine) -NoNewline
          Write-Host "Wrote $dirProps"

      - name: Build Windows test app (with retries)
        uses: nick-fields/retry@7152eba30c6575329ac0576536151aca5a72780e # v3.0.0
        with:
          timeout_minutes: 45
          max_attempts: 3
          retry_on: error
          shell: bash
          # Belt + suspenders for the SDK retarget: Directory.Build.props
          # pins the version, AND we pass it via --msbuildprops so
          # command-line msbuild sees it too.
          # Note: --no-launch only (no --no-deploy) so the AppX gets
          # registered on the runner; the screenshot step needs an
          # installed package to apply the loopback exemption to.
          # --release: Debug CRT pops a 'Debug Error! abort()' dialog
          # that blocks the process from actually faulting (no WER
          # dump, no diagnosable crash). Release CRT terminates on
          # abort silently → WER fires → we get a minidump.
          command: |
            cd apps/example
            npx react-native run-windows \
              --arch x64 \
              --release \
              --no-launch \
              --logging \
              --msbuildprops "AppxPackageSigningEnabled=false;WindowsTargetPlatformVersion=10.0.26100.0;TargetPlatformVersion=10.0.26100.0"

      # The build step's `--no-launch` only creates the AppX layout
      # in the deployment folder; it doesn't actually register the
      # package with the OS. Run an extra `run-windows --no-build
      # --no-autolink --no-launch` first to force registration via
      # MSBuild's Deploy target plus its install logic.
      - name: Run app and capture screenshot
        if: success()
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'

          # 1) Force-register the AppX (run-windows handles framework
          # deps like Microsoft.WindowsAppRuntime.1.7 properly).
          Push-Location apps/example
          Write-Host "===== run-windows --no-launch to register AppX ====="
          npx react-native run-windows `
            --arch x64 `
            --release `
            --no-build `
            --no-autolink `
            --no-launch `
            --logging
          Pop-Location

          # 2) Resolve the registered AppX package. The test-app's
          # PackageName is a GUID (not "ReactTestApp"), so match by
          # InstallLocation pointing into our build's Debug\AppX\.
          $expectedRoot = (Resolve-Path "apps/example/windows").Path
          $pkg = Get-AppxPackage `
            | Where-Object { $_.InstallLocation -and $_.InstallLocation.StartsWith($expectedRoot) } `
            | Sort-Object -Property InstallDate -Descending `
            | Select-Object -First 1

          if (-not $pkg) {
            Write-Host "Test-app AppX not found by InstallLocation. Recent packages:"
            Get-AppxPackage `
              | Sort-Object -Property InstallDate -Descending `
              | Select-Object -First 10 `
              | Format-Table Name,PackageFamilyName,InstallLocation -AutoSize
          } else {
            Write-Host "Found test-app: $($pkg.PackageFamilyName) at $($pkg.InstallLocation)"
          }

          # 3) Loopback exemption MUST happen between deploy and
          # launch — UWP/AppX apps cannot reach localhost otherwise
          # and React Native aborts fetching the JS bundle.
          if ($pkg) {
            Write-Host "Adding loopback exemption for: $($pkg.PackageFamilyName)"
            CheckNetIsolation LoopbackExempt -a -n="$($pkg.PackageFamilyName)" | Out-Host
            CheckNetIsolation LoopbackExempt -s | Out-Host
          } else {
            Write-Host "(No installed ReactTestApp AppX found — loopback skipped)"
          }

          # 4) Start metro in the background.
          $metro = Start-Job -ScriptBlock {
            Set-Location $using:PWD\apps\example
            npx react-native start --port 8081
          }
          Start-Sleep -Seconds 15

          # 5) Suppress JIT debugger / CRT abort dialogs so the app
          # either runs cleanly or actually faults (and WER fires).
          reg add "HKLM\Software\Microsoft\Windows\Windows Error Reporting" /v DontShowUI /t REG_DWORD /d 1 /f | Out-Host
          reg add "HKCU\Software\Microsoft\Windows\Windows Error Reporting" /v DontShowUI /t REG_DWORD /d 1 /f | Out-Host
          # Force-create a LocalDumps target so .dmp files land in a
          # known location for upload as artifact.
          $dumpDir = "$env:GITHUB_WORKSPACE\reactapp-dumps"
          New-Item -ItemType Directory -Force -Path $dumpDir | Out-Null
          reg add "HKLM\Software\Microsoft\Windows\Windows Error Reporting\LocalDumps" /v DumpFolder /t REG_EXPAND_SZ /d "$dumpDir" /f | Out-Host
          reg add "HKLM\Software\Microsoft\Windows\Windows Error Reporting\LocalDumps" /v DumpType /t REG_DWORD /d 2 /f | Out-Host
          reg add "HKLM\Software\Microsoft\Windows\Windows Error Reporting\LocalDumps" /v DumpCount /t REG_DWORD /d 5 /f | Out-Host

          # 6) Launch the Win32 binary directly with stdout/stderr
          # captured so we can see anything React Native prints
          # before it aborts.
          $exe = Get-ChildItem -Path "apps/example/windows/x64/Release" `
            -Filter "ReactApp.exe" -ErrorAction SilentlyContinue `
            | Select-Object -First 1
          $logDir = "$env:GITHUB_WORKSPACE\reactapp-logs"
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          if ($exe) {
            Write-Host "Launching Win32 directly: $($exe.FullName)"
            Start-Process -FilePath $exe.FullName `
              -WorkingDirectory (Split-Path $exe.FullName) `
              -RedirectStandardOutput "$logDir\stdout.log" `
              -RedirectStandardError "$logDir\stderr.log"
          } elseif ($pkg) {
            $aumid = "$($pkg.PackageFamilyName)!App"
            Write-Host "Launching via shell: $aumid"
            Start-Process "explorer.exe" "shell:appsFolder\$aumid"
          } else {
            Write-Host "No launchable binary found"
          }

          # Auto-dismiss any CRT abort dialog by sending Alt+I
          # (Ignore) to it. Runs in a background job so screenshots
          # can still be captured if the dialog stays.
          Start-Job -Name dismiss -ScriptBlock {
            Add-Type -AssemblyName System.Windows.Forms
            for ($i = 0; $i -lt 20; $i++) {
              Start-Sleep -Seconds 2
              $procs = Get-Process | Where-Object {
                $_.MainWindowTitle -match "Runtime Library|Debug Error|Application Error"
              }
              foreach ($p in $procs) {
                Write-Host "Dismissing dialog: $($p.MainWindowTitle) (PID $($p.Id))"
                try {
                  [System.Windows.Forms.SendKeys]::SendWait("%i")
                } catch { }
              }
            }
          } | Out-Null

      # After screenshots, dump anything Windows recorded about the
      # ReactApp.exe crash (event log + WER reports) so the next
      # iteration knows what's actually failing rather than just
      # 'abort()'.
      - name: Dump ReactApp crash diagnostics
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          Write-Host "===== Application event log (last hour, ReactApp/abort) ====="
          try {
            Get-WinEvent -FilterHashtable @{
              LogName='Application';
              StartTime=(Get-Date).AddHours(-1);
              ProviderName='Application Error','Windows Error Reporting','.NET Runtime'
            } -ErrorAction SilentlyContinue `
              | Where-Object { $_.Message -match "ReactApp" } `
              | Select-Object -First 10 TimeCreated,Id,LevelDisplayName,Message `
              | Format-List
          } catch { Write-Host "Event log query failed: $_" }

          Write-Host "===== WER report archives (last hour) ====="
          $werDirs = @(
            "$env:LOCALAPPDATA\Microsoft\Windows\WER\ReportArchive",
            "$env:LOCALAPPDATA\Microsoft\Windows\WER\ReportQueue",
            "$env:ProgramData\Microsoft\Windows\WER\ReportArchive",
            "$env:ProgramData\Microsoft\Windows\WER\ReportQueue"
          )
          foreach ($d in $werDirs) {
            if (Test-Path $d) {
              Get-ChildItem -Path $d -Directory -ErrorAction SilentlyContinue `
                | Where-Object { $_.LastWriteTime -gt (Get-Date).AddHours(-1) } `
                | ForEach-Object {
                  Write-Host "--- $($_.FullName) ---"
                  Get-ChildItem -Path $_.FullName -ErrorAction SilentlyContinue `
                    | Format-Table Name,Length -AutoSize
                  $reportTxt = Join-Path $_.FullName "Report.wer"
                  if (Test-Path $reportTxt) { Get-Content $reportTxt | Select-Object -First 60 | Out-Host }
                }
            }
          }

          # 5) Capture multi-frame screenshots.
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          New-Item -ItemType Directory -Force -Path screenshots | Out-Null
          $bounds  = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          foreach ($i in 0..7) {
            Start-Sleep -Seconds 5
            $bitmap  = New-Object System.Drawing.Bitmap($bounds.Width, $bounds.Height)
            $graphic = [System.Drawing.Graphics]::FromImage($bitmap)
            $graphic.CopyFromScreen($bounds.X, $bounds.Y, 0, 0, $bounds.Size)
            $name = "screenshots/test-app-windows-x64-{0:D2}.png" -f $i
            $bitmap.Save($name)
            $bitmap.Dispose()
            $graphic.Dispose()
            Write-Host "Saved $name"
          }

      - name: Upload Windows test app build artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: test-app-windows-build
          path: |
            apps/example/windows/**/*.binlog
            apps/example/windows/**/*.log
            apps/example/windows/AppPackages/**
            reactapp-logs/**
            reactapp-dumps/**
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Windows test app screenshot
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: test-app-windows-screenshot
          path: screenshots/**
          if-no-files-found: warn
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    env:
      TURBO_CACHE_DIR: .turbo/android
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Free disk space
        run: |
          echo "Disk usage before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          sudo apt-get clean
          echo "Disk usage after cleanup:"
          df -h

      - name: Cache turborepo for Android
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-android-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-android

      - name: Install JDK
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install NDK
        uses: nttld/setup-ndk@afb4c9964b521afb97c864b7d40b11e6911bd410 # v1.5.0
        id: setup-ndk
        with:
          ndk-version: r27d
  
      - name: Set ANDROID_NDK
        run: echo "ANDROID_NDK=$ANDROID_HOME/ndk-bundle" >> $GITHUB_ENV

      - name: Finalize Android SDK
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Install Android SDK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > $GITHUB_WORKSPACE/apps/example/android/local.properties

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('./apps/example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build example for Android
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
        run: |
          yarn turbo run build:android --concurrency 1

      - name: Cache apk
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          cache-name: cache-apk
        with:
          path: apps/example/android/app/build/outputs/apk/debug/app-debug.apk
          key: apk-${{ github.sha }}

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: android-example-apk
          path: apps/example/android/app/build/outputs/apk/debug/app-debug.apk

  test-android:
    needs: build-android
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TURBO_CACHE_DIR: .turbo/android
    steps:
      - name: checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        
      - name: Install Android SDK tools
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH
        
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Restore APK
        id: cache-apk
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: apps/example/android/app/build/outputs/apk/debug/app-debug.apk
          key: apk-${{ github.sha }}

      - name: Start Package Manager
        working-directory: apps/example/
        run: E2E=true yarn start &

      - name: Run Android Emulator Tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 30
          arch: x86_64
          profile: Nexus 5X
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            # Wait for Metro bundler
            sleep 10
            
            # Install and launch app
            adb install -r apps/example/android/app/build/outputs/apk/debug/app-debug.apk
            adb shell monkey -p com.microsoft.reacttestapp 1
            
            # Run tests
            cd packages/skia && CI=true yarn e2e --testPathIgnorePatterns Paragraphs

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        if: failure()
        with:
          path: packages/skia/src/__tests__/snapshots/
          name: tests-snapshots-screenshots

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        if: failure()
        with:
          path: apps/docs/static/
          name: tests-docs-screenshots

  build-test-ios:
    runs-on: macos-latest-xlarge
    env:
      TURBO_CACHE_DIR: .turbo/ios
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache turborepo for iOS
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-ios-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-ios-

      - name: Check turborepo cache for iOS
        run: |
          TURBO_CACHE_STATUS=$(node -p "($(yarn turbo run build:ios --cache-dir="${{ env.TURBO_CACHE_DIR }}" --dry=json)).tasks.find(t => t.task === 'build:ios').cache.status")

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      - name: Install CocoaPods
        working-directory: apps/example/ios
        run: pod install

      - name: Start Package Manager
        working-directory: apps/example
        run: E2E=true yarn start &
  
      - name: Build example for iOS
        working-directory: apps/example
        run: yarn ios --simulator 'iPhone 16 Pro'

      - name: Run e2e tests
        working-directory: packages/skia
        run: CI=true yarn e2e

  build-test-macos:
    runs-on: macos-latest
    env:
      TURBO_CACHE_DIR: .turbo/macos
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache turborepo for macOS
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-macos-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-macos-

      - name: Build example for macOS
        run: yarn turbo run build:macos --concurrency 1

