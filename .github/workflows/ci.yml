name: CI
on:
  push:
    branches:
      - main
      - next
  pull_request:
    branches:
      - main
      - next
  merge_group:
    types:
      - checks_requested
  workflow_dispatch: {}

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      - run: pip install cpplint
      - run: cpplint --linelength=230 --filter=-legal/copyright,-whitespace/indent,-whitespace/comments,-whitespace/ending_newline,-build/include_order,-runtime/references,-readability/todo,-whitespace/blank_line,-whitespace/todo,-runtime/int,-build/c++11,-whitespace/parens --exclude=package/cpp/skia --exclude=package/apple --exclude=package/android/build --exclude=package/node_modules --recursive package
      - name: cpplint windows native module
        run: cpplint --linelength=230 --filter=-legal/copyright,-whitespace/indent,-whitespace/comments,-whitespace/ending_newline,-build/include_order,-runtime/references,-readability/todo,-whitespace/blank_line,-whitespace/todo,-runtime/int,-build/c++11,-whitespace/parens,-build/c++17,-build/include_subdir,-build/include_what_you_use --recursive packages/skia/windows/ReactNativeSkia
        continue-on-error: true

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      # - name: Clang Format Check
      #   working-directory: packages/skia
      #   run: |
      #     yarn clang-format
      #     if [[ `git status --porcelain` ]]; then
      #       echo "ERROR: clang-format would modify files. Please run 'yarn clang-format' and commit the changes."
      #       echo "Files that would be modified:"
      #       git status --porcelain
      #       echo "Diff of changes:"
      #       git diff
      #       exit 1
      #     fi

      - name: Lint files
        run: yarn lint

      - name: Typecheck files
        run: yarn tsc

  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        run: yarn test

  build-library:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        run: yarn build

      - name: Pack package
        working-directory: packages/skia
        run: yarn pack

      - name: Upload package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: package-tgz
          path: packages/skia/package.tgz

      - name: Build dry run release
        working-directory: packages/skia
        run: |
          npx semantic-release --dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  test-package-e2e:
    needs: build-library
    uses: ./.github/workflows/test-skia-package.yml
    with:
      skia_version: artifact:${{ needs.build-library.outputs.run_id }}
      test_ios: true
      test_android: true
      test_web: true

  build-windows-library:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        run: yarn build

      # MSBuild will reject a malformed .vcxproj on its own; the prior
      # xmlstarlet-based pre-flight check kept flaking on `choco install` and
      # added no signal beyond what MSBuild reports.
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2.0.0

      - name: Setup NuGet
        uses: NuGet/setup-nuget@a21f25cd3998bf370fde17e3f1b4c12c175172f9 # v2.0.0

      - name: Restore NuGet packages
        working-directory: packages/skia/windows
        run: nuget restore ReactNativeSkia.sln

      # Compile the native Windows module without linking. The link step
      # cannot succeed until a Skia prebuilt for windows/{x64,arm64} is
      # published — that's tracked separately via `build-skia.yml`'s
      # `build-windows` job. The compile step alone catches:
      #   - Windows SDK / cppwinrt header mismatches
      #   - Microsoft.ReactNative API drift
      #   - Skia header path / inclusion errors
      #   - C++20 + Skia source-level breakages
      # Failures here are real signal even though linker errors are not.
      - name: Compile ReactNativeSkia (no link, x64 Debug)
        working-directory: packages/skia/windows
        continue-on-error: true
        run: msbuild ReactNativeSkia.sln /p:Configuration=Debug /p:Platform=x64 /t:ClCompile /v:normal /bl:msbuild-x64-debug.binlog

      - name: Upload MSBuild binlog
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: msbuild-windows-binlog
          path: packages/skia/windows/msbuild-x64-debug.binlog
          if-no-files-found: warn

  build-test-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    # The Windows test-app build is exploratory in Phase 1 (RNW autolink
    # + NuGet version alignment + Fabric component registration drift).
    # Don't fail the whole CI run on it yet; the binlog/screenshot
    # artifacts are the deliverable.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2.0.0

      - name: Setup NuGet
        uses: NuGet/setup-nuget@a21f25cd3998bf370fde17e3f1b4c12c175172f9 # v2.0.0

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@7e868db0f3406270dd46e1dac26c65f621456723 # master

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Update depot_tools
        working-directory: ./externals/depot_tools
        run: ./update_depot_tools.bat
        shell: cmd

      # Build Skia for windows-x64 inline. Phase 2 will switch this to
      # download the prebuilt artifact from build-skia.yml's release
      # publish; that's not blocking on the test-app validation we want
      # here.
      - name: Build Skia for Windows x64
        working-directory: ./packages/skia
        env:
          GIT_SYNC_DEPS_SKIP_EMSDK: 'true'
        run: yarn build-skia windows-x64
        shell: bash

      # The example app pins react-native@0.83.1, but
      # react-native-windows tracks RN versions and the latest published
      # is 0.81.x. Without a matching RNW init-test-app silently skips
      # Windows scaffolding ('react-native-windows@0.83 cannot be added
      # because it does not exist'). Override the example's RN+RNW to
      # 0.81 for this CI job only (the lockfile change isn't pushed
      # back). YARN_ENABLE_IMMUTABLE_INSTALLS=false relaxes the
      # `--immutable` policy the Setup composite enforced for the rest
      # of the workspace.
      # The example app pins:
      #   - react-native@0.83.1 (no matching RNW exists yet)
      #   - react-native-windows@^0.75.0 (too old for our peer dep)
      #   - react-native-test-app@4.4.7 (only supports RNW 0.70-0.79)
      # Bump all three to a CI-only set that lines up: RNW 0.81.x +
      # RN 0.81.x + test-app 5.1.x (which accepts RNW 0.76-0.82).
      # YARN_ENABLE_IMMUTABLE_INSTALLS=false relaxes the immutable
      # policy the Setup composite enforced.
      - name: Override RN + RNW + test-app versions for init (CI-only)
        working-directory: apps/example
        shell: bash
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
        run: |
          yarn add react-native@^0.81.0 react-native-windows@^0.81.0
          yarn add --dev react-native-test-app@^5.1.0

      # init-test-app sets up the test-app project (downloads the
      # template-0.81.x.tgz, configures react-native.config.js, etc.)
      # but does NOT actually generate the windows/ host files. Per
      # the test-app docs the Windows scaffolding is a separate
      # `npx install-windows-test-app` step that materializes
      # apps/example/windows/example.sln + project files.
      - name: Initialize test-app project
        working-directory: apps/example
        shell: bash
        run: |
          npx --yes init-test-app \
            --platform windows \
            --destination . \
            --name example \
            --version 0.81

      - name: Install Windows test-app host (sln + vcxproj scaffolding)
        working-directory: apps/example
        shell: bash
        run: |
          npx --yes install-windows-test-app

      - name: Build Windows test app (with retries)
        uses: nick-fields/retry@7152eba30c6575329ac0576536151aca5a72780e # v3.0.0
        with:
          timeout_minutes: 45
          max_attempts: 3
          retry_on: error
          shell: bash
          command: |
            cd apps/example
            npx react-native run-windows \
              --arch x64 \
              --no-launch \
              --no-deploy \
              --logging \
              --msbuildprops "AppxPackageSigningEnabled=false"

      # If the build succeeded, try a deploy + launch + screenshot pass.
      # Capture is best-effort: failures here mustn't fail the job.
      - name: Run app and capture screenshot
        if: success()
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          # Start metro in the background so the JS bundle loads when the
          # test-app launches.
          Start-Process -NoNewWindow -FilePath "node" `
            -ArgumentList "node_modules/react-native/cli.js","start","--port","8081" `
            -WorkingDirectory "apps/example"
          Start-Sleep -Seconds 15

          # Launch the built app. react-native-test-app installs to a
          # known package family; use App-X deploy + Start.
          Push-Location apps/example
          try {
            npx react-native run-windows --arch x64 --logging --no-build --no-autolink
          } catch {
            Write-Host "Launch failed: $_"
          }
          Pop-Location
          Start-Sleep -Seconds 30

          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $bounds  = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bitmap  = New-Object System.Drawing.Bitmap($bounds.Width, $bounds.Height)
          $graphic = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphic.CopyFromScreen($bounds.X, $bounds.Y, 0, 0, $bounds.Size)
          New-Item -ItemType Directory -Force -Path screenshots | Out-Null
          $bitmap.Save("screenshots/test-app-windows-x64.png")
          Write-Host "Screenshot saved."

      - name: Upload Windows test app build artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: test-app-windows-build
          path: |
            apps/example/windows/**/*.binlog
            apps/example/windows/**/*.log
            apps/example/windows/AppPackages/**
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Windows test app screenshot
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: test-app-windows-screenshot
          path: screenshots/**
          if-no-files-found: warn
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    env:
      TURBO_CACHE_DIR: .turbo/android
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Free disk space
        run: |
          echo "Disk usage before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          sudo apt-get clean
          echo "Disk usage after cleanup:"
          df -h

      - name: Cache turborepo for Android
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-android-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-android

      - name: Install JDK
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install NDK
        uses: nttld/setup-ndk@afb4c9964b521afb97c864b7d40b11e6911bd410 # v1.5.0
        id: setup-ndk
        with:
          ndk-version: r27d
  
      - name: Set ANDROID_NDK
        run: echo "ANDROID_NDK=$ANDROID_HOME/ndk-bundle" >> $GITHUB_ENV

      - name: Finalize Android SDK
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null"

      - name: Install Android SDK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > $GITHUB_WORKSPACE/apps/example/android/local.properties

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('./apps/example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build example for Android
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
        run: |
          yarn turbo run build:android --concurrency 1

      - name: Cache apk
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          cache-name: cache-apk
        with:
          path: apps/example/android/app/build/outputs/apk/debug/app-debug.apk
          key: apk-${{ github.sha }}

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        with:
          name: android-example-apk
          path: apps/example/android/app/build/outputs/apk/debug/app-debug.apk

  test-android:
    needs: build-android
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TURBO_CACHE_DIR: .turbo/android
    steps:
      - name: checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        
      - name: Install Android SDK tools
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH
        
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Restore APK
        id: cache-apk
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: apps/example/android/app/build/outputs/apk/debug/app-debug.apk
          key: apk-${{ github.sha }}

      - name: Start Package Manager
        working-directory: apps/example/
        run: E2E=true yarn start &

      - name: Run Android Emulator Tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 30
          arch: x86_64
          profile: Nexus 5X
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            # Wait for Metro bundler
            sleep 10
            
            # Install and launch app
            adb install -r apps/example/android/app/build/outputs/apk/debug/app-debug.apk
            adb shell monkey -p com.microsoft.reacttestapp 1
            
            # Run tests
            cd packages/skia && CI=true yarn e2e --testPathIgnorePatterns Paragraphs

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        if: failure()
        with:
          path: packages/skia/src/__tests__/snapshots/
          name: tests-snapshots-screenshots

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v6.0.0
        if: failure()
        with:
          path: apps/docs/static/
          name: tests-docs-screenshots

  build-test-ios:
    runs-on: macos-latest-xlarge
    env:
      TURBO_CACHE_DIR: .turbo/ios
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache turborepo for iOS
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-ios-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-ios-

      - name: Check turborepo cache for iOS
        run: |
          TURBO_CACHE_STATUS=$(node -p "($(yarn turbo run build:ios --cache-dir="${{ env.TURBO_CACHE_DIR }}" --dry=json)).tasks.find(t => t.task === 'build:ios').cache.status")

          if [[ $TURBO_CACHE_STATUS == "HIT" ]]; then
            echo "turbo_cache_hit=1" >> $GITHUB_ENV
          fi

      - name: Install CocoaPods
        working-directory: apps/example/ios
        run: pod install

      - name: Start Package Manager
        working-directory: apps/example
        run: E2E=true yarn start &
  
      - name: Build example for iOS
        working-directory: apps/example
        run: yarn ios --simulator 'iPhone 16 Pro'

      - name: Run e2e tests
        working-directory: packages/skia
        run: CI=true yarn e2e

  build-test-macos:
    runs-on: macos-latest
    env:
      TURBO_CACHE_DIR: .turbo/macos
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v5.0.0
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache turborepo for macOS
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.TURBO_CACHE_DIR }}
          key: ${{ runner.os }}-turborepo-macos-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-turborepo-macos-

      - name: Build example for macOS
        run: yarn turbo run build:macos --concurrency 1

